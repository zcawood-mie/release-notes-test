name-template: '$RESOLVED_VERSION'
tag-template: '$RESOLVED_VERSION'

categories:
  - title: '## New Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '## Bug Fixes'
    labels:
      - 'fix'
      - 'bug'
  - title: '## Maintenance'
    labels:
      - 'chore'
      - 'dependencies'

change-template: '- $TITLE ([PR #$NUMBER](https://github.com/$OWNER/$REPOSITORY/pull/$NUMBER))'

version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'fix'
      - 'bug'
      - 'chore'
  default: patch

autolabeler:
  - label: 'feature'
    branch:
      - '/^feature\/.+/'
    title:
      - '/^feat/i'
  - label: 'fix'
    branch:
      - '/^fix\/.+/'
    title:
      - '/^fix/i'
  - label: 'chore'
    branch:
      - '/^chore\/.+/'
    title:
      - '/^chore/i'

template: |
  $CHANGES
